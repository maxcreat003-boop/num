<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time SMS Dashboard - Live message monitoring">
    <title>SMS Live Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================
   RESET & VARIABLES
   ============================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --bg: #000000;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.07);
    --bg-glass: rgba(255,255,255,0.05);
    --bg-glass-strong: rgba(255,255,255,0.09);
    --text: #ffffff;
    --text-dim: #a0a0b8;
    --text-muted: #5a5a78;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.25);
    --green: #10b981;
    --green-glow: rgba(16,185,129,0.25);
    --purple: #a855f7;
    --orange: #f59e0b;
    --pink: #ec4899;
    --red: #ef4444;
    --cyan: #06b6d4;
    --whatsapp: #25D366;
    --wa-glow: rgba(37,211,102,0.18);
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --radius: 14px;
    --radius-sm: 8px;
    --radius-pill: 50px;
    --fast: 0.15s cubic-bezier(0.4,0,0.2,1);
    --base: 0.25s cubic-bezier(0.4,0,0.2,1);
    --spring: 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

html { scroll-behavior: smooth; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ============================================
   ANIMATED BACKGROUND ORBS
   ============================================ */
.bg-orbs {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
}
.orb {
    position: absolute; border-radius: 50%;
    filter: blur(100px); opacity: 0.25;
    animation: orbDrift 20s ease-in-out infinite;
}
.orb-1 { width:550px; height:550px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); top:-12%; left:-8%; animation-duration:26s; }
.orb-2 { width:450px; height:450px; background: radial-gradient(circle, var(--purple) 0%, transparent 70%); top:45%; right:-12%; animation-delay:-6s; animation-duration:22s; }
.orb-3 { width:350px; height:350px; background: radial-gradient(circle, var(--pink) 0%, transparent 70%); bottom:-8%; left:25%; animation-delay:-12s; animation-duration:24s; }
.orb-4 { width:280px; height:280px; background: radial-gradient(circle, var(--cyan) 0%, transparent 70%); top:25%; left:55%; animation-delay:-16s; animation-duration:28s; }

@keyframes orbDrift {
    0%,100% { transform: translate(0,0) scale(1); }
    25% { transform: translate(60px,-90px) scale(1.1); }
    50% { transform: translate(-40px,70px) scale(0.9); }
    75% { transform: translate(90px,40px) scale(1.05); }
}

/* ============================================
   MAIN APP
   ============================================ */
#app {
    position: relative; z-index: 2;
    max-width: 920px; margin: 0 auto;
    padding: 0 20px 50px;
}

/* ============================================
   HEADER
   ============================================ */
.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    background: rgba(0,0,0,0.6);
    margin: 0 -20px; border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 12px; }

.logo-wrap { display: flex; align-items: center; gap: 12px; }
.logo-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: #fff; box-shadow: 0 4px 20px var(--accent-glow);
}
.logo-icon svg { width: 20px; height: 20px; }
.logo-text h1 {
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.02em; line-height: 1.2;
}
.logo-sub {
    font-size: 0.62rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}

.header-center { position: absolute; left: 50%; transform: translateX(-50%); }
.status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 16px; border-radius: var(--radius-pill);
    background: var(--bg-glass); border: 1px solid var(--border);
    font-size: 0.73rem; font-weight: 500; color: var(--text-dim);
    backdrop-filter: blur(12px);
}
.status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange); animation: blink 2s ease-in-out infinite;
}
.status-pill.live .status-dot { background: var(--green); box-shadow: 0 0 12px var(--green-glow); }
.status-pill.live .status-text { color: var(--green); }
.status-pill.error .status-dot { background: var(--red); animation: none; }
.status-pill.error .status-text { color: var(--red); }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }

.header-right { display: flex; align-items: center; gap: 8px; }
.chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: var(--radius-pill);
    background: var(--bg-glass); border: 1px solid var(--border);
    font-size: 0.73rem; font-weight: 600; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
}
.chip svg { color: var(--accent); width:15px; height:15px; }

.icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg-glass);
    color: var(--text-dim); display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: all var(--base);
    backdrop-filter: blur(8px);
}
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn:hover { background: var(--bg-glass-strong); border-color: var(--border-hover); color: #fff; transform: scale(1.05); }
.icon-btn:active { transform: scale(0.93); }
.icon-btn.spinning svg { animation: spin .8s ease-in-out; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

/* ============================================
   STATS
   ============================================ */
.stats {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 12px; margin-top: 20px;
}
.stat-box {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; border-radius: var(--radius);
    background: var(--bg-glass); border: 1px solid var(--border);
    backdrop-filter: blur(16px); transition: all var(--base);
}
.stat-box:hover { background: var(--bg-glass-strong); border-color: var(--border-hover); transform: translateY(-2px); }
.stat-ico {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stat-ico svg { width:20px; height:20px; }
.stat-ico.blue { background: rgba(99,102,241,.12); color: var(--accent); }
.stat-ico.green { background: rgba(16,185,129,.12); color: var(--green); }
.stat-ico.purple { background: rgba(168,85,247,.12); color: var(--purple); }
.stat-ico.orange { background: rgba(245,158,11,.12); color: var(--orange); }
.stat-info { display: flex; flex-direction: column; gap: 2px; min-width:0; }
.stat-val {
    font-size: 1.05rem; font-weight: 700; color: #fff;
    font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.stat-lbl {
    font-size: 0.68rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}

/* ============================================
   CONTROLS
   ============================================ */
.controls {
    display: flex; align-items: center; gap: 12px;
    margin-top: 16px; flex-wrap: wrap;
}
.search-box {
    flex: 1; min-width: 200px; position: relative;
    display: flex; align-items: center;
}
.search-box svg.si {
    position: absolute; left: 14px; width: 16px; height: 16px;
    color: var(--text-muted); pointer-events: none;
}
.search-box input {
    width: 100%; padding: 10px 14px 10px 40px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg-glass); color: #fff;
    font-family: 'Inter', sans-serif; font-size: 0.85rem;
    outline: none; transition: all var(--base);
    backdrop-filter: blur(8px);
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: var(--bg-glass-strong); }
.search-box kbd {
    position: absolute; right: 10px; padding: 2px 6px;
    border-radius: 4px; background: var(--bg-glass); border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
    color: var(--text-muted); pointer-events: none;
}
.pills { display: flex; gap: 6px; }
.pill {
    padding: 8px 16px; border-radius: var(--radius-pill);
    border: 1px solid var(--border); background: var(--bg-glass);
    color: var(--text-dim); font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all var(--base);
    display: flex; align-items: center; gap: 6px;
    font-family: 'Inter', sans-serif;
}
.pill:hover { background: var(--bg-glass-strong); border-color: var(--border-hover); }
.pill.active { background: linear-gradient(135deg, rgba(99,102,241,.18), rgba(99,102,241,.08)); border-color: var(--accent); color: var(--accent); }
.dot { width:8px; height:8px; border-radius:50%; }
.dot.wa { background: var(--whatsapp); }
.dot.ot { background: var(--orange); }

.view-tog {
    display: flex; gap: 4px; padding: 4px;
    border-radius: 10px; background: var(--bg-glass); border: 1px solid var(--border);
}
.vbtn {
    padding: 6px 10px; border-radius: var(--radius-sm);
    border: none; background: transparent; color: var(--text-muted);
    cursor: pointer; transition: all var(--base);
    display: flex; align-items: center; justify-content: center;
}
.vbtn:hover { color: var(--text-dim); }
.vbtn.active { background: var(--bg-glass-strong); color: var(--accent); }

/* ============================================
   PROGRESS BAR
   ============================================ */
.progress {
    width: 100%; height: 3px; background: var(--bg-glass);
    border-radius: 2px; margin-top: 16px; overflow: hidden;
}
.progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--purple), var(--cyan));
    border-radius: 2px; transition: width 0.1s linear;
    background-size: 200% 100%; animation: shimmer 2s linear infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ============================================
   MESSAGES
   ============================================ */
.msg-wrap { margin-top: 16px; min-height: 400px; }
.msg-list { display: flex; flex-direction: column; gap: 10px; }
.msg-list.grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }

.msg {
    position: relative; padding: 16px 20px;
    border-radius: var(--radius); background: var(--bg-glass);
    border: 1px solid var(--border); backdrop-filter: blur(16px);
    transition: all var(--base); cursor: pointer; overflow: hidden;
    animation: cardIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
.msg::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: linear-gradient(180deg, var(--whatsapp), var(--cyan));
    border-radius: 0 2px 2px 0; opacity: 0; transition: opacity var(--base);
}
.msg:hover { background: var(--bg-card-hover); border-color: var(--border-hover); transform: translateX(4px); }
.msg:hover::before { opacity: 1; }
.msg.fresh {
    animation: freshIn .6s cubic-bezier(.34,1.56,.64,1) both;
    border-color: var(--green); box-shadow: 0 0 25px var(--green-glow);
}
.msg.fresh::before { opacity:1; background: linear-gradient(180deg, var(--green), var(--cyan)); }

@keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes freshIn {
    0%{opacity:0;transform:translateX(-30px) scale(.95);box-shadow:0 0 40px var(--green-glow)}
    50%{box-shadow:0 0 60px var(--green-glow)}
    100%{opacity:1;transform:translateX(0) scale(1);box-shadow:0 0 25px var(--green-glow)}
}

.msg-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.msg-src { display: flex; align-items: center; gap: 8px; }
.badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: var(--radius-pill);
    font-size: 0.68rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
}
.badge.wa { background: var(--wa-glow); color: var(--whatsapp); border: 1px solid rgba(37,211,102,.2); }
.badge.ot { background: rgba(245,158,11,.1); color: var(--orange); border: 1px solid rgba(245,158,11,.2); }
.badge svg { width:12px; height:12px; }
.msg-phone {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; font-weight: 600; color: #fff;
    letter-spacing: 0.02em;
}
.msg-time {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.7rem; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
}
.msg-time svg { width:12px; height:12px; }
.time-ago { color: var(--cyan); font-weight: 500; }

.msg-body {
    font-size: 0.88rem; color: var(--text-dim); line-height: 1.6;
    word-break: break-word; padding-left: 12px;
    border-left: 2px solid var(--border);
}
.code-hl {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; font-weight: 700; color: var(--green);
    background: rgba(16,185,129,.1); padding: 2px 8px;
    border-radius: 4px; letter-spacing: 0.15em; margin: 0 2px;
}

.msg-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
}
.msg-idx {
    font-size: 0.63rem; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px; border-radius: var(--radius-sm); background: var(--bg-glass);
}
.msg-actions { display: flex; gap: 6px; opacity: 0; transition: opacity var(--base); }
.msg:hover .msg-actions { opacity: 1; }
.abtn {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg-glass);
    color: var(--text-muted); display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: all var(--fast);
}
.abtn:hover { color: var(--accent); border-color: var(--accent); background: rgba(99,102,241,.1); }
.abtn svg { width:13px; height:13px; }

/* ============================================
   LOADING / EMPTY
   ============================================ */
.loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; padding: 60px 0; color: var(--text-muted);
}
.loading.hidden, .empty.hidden { display: none; }
.spinner { position: relative; width: 50px; height: 50px; }
.ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid transparent; animation: rspin 1.5s linear infinite;
}
.ring:nth-child(1) { border-top-color: var(--accent); }
.ring:nth-child(2) { inset: 4px; border-right-color: var(--purple); animation-delay:.2s; animation-direction:reverse; }
.ring:nth-child(3) { inset: 8px; border-bottom-color: var(--cyan); animation-delay:.4s; }
@keyframes rspin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

.empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; padding: 60px 0; color: var(--text-muted);
}
.empty svg { opacity:.3; }
.empty h3 { color: var(--text-dim); font-weight: 600; }

/* ============================================
   SCROLL TOP
   ============================================ */
.scroll-top {
    position: fixed; bottom: 30px; right: 30px;
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid var(--border); background: rgba(0,0,0,.6);
    backdrop-filter: blur(20px); color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all var(--base);
    box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 999;
}
.scroll-top svg { width:20px; height:20px; }
.scroll-top:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.5), 0 0 30px var(--accent-glow); border-color: var(--accent); }
.scroll-top.hidden { opacity:0; pointer-events:none; transform:translateY(10px); }

/* ============================================
   TOASTS
   ============================================ */
.toasts {
    position: fixed; top: 80px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
}
.toast {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-radius: 12px;
    background: rgba(0,0,0,.75); backdrop-filter: blur(20px);
    border: 1px solid var(--border); color: #fff;
    font-size: 0.85rem; font-weight: 500;
    box-shadow: 0 16px 64px rgba(0,0,0,.5);
    animation: tIn .4s cubic-bezier(.34,1.56,.64,1);
    max-width: 350px;
}
.toast.success { border-color: rgba(16,185,129,.3); }
.toast.info { border-color: rgba(99,102,241,.3); }
.toast.error { border-color: rgba(239,68,68,.3); }
.toast-i { width:20px; height:20px; flex-shrink:0; }
.toast.success .toast-i { color: var(--green); }
.toast.info .toast-i { color: var(--accent); }
.toast.error .toast-i { color: var(--red); }
.toast-out { animation: tOut .3s ease forwards; }
@keyframes tIn { from{opacity:0;transform:translateX(100px) scale(.8)} to{opacity:1;transform:translateX(0) scale(1)} }
@keyframes tOut { to{opacity:0;transform:translateX(100px) scale(.8)} }

/* ============================================
   COPIED FLASH
   ============================================ */
.copied { animation: cFlash .5s ease; }
@keyframes cFlash { 0%{background:rgba(16,185,129,.2)} 100%{background:var(--bg-glass)} }

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:768px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .header-center { display:none; }
    .controls { flex-direction:column; align-items:stretch; }
    .search-box { min-width:unset; }
    .pills { overflow-x:auto; scrollbar-width:none; }
    .pills::-webkit-scrollbar { display:none; }
    .msg-list.grid { grid-template-columns:1fr; }
    .chip, .search-box kbd { display:none; }
    .msg:hover { transform:none; }
    #app { padding:0 12px 30px; }
    .header { margin:0 -12px; padding:12px; }
}
@media(max-width:480px) {
    .stats { gap:8px; }
    .stat-box { padding:12px; }
    .stat-ico { width:36px; height:36px; }
    .stat-val { font-size:.95rem; }
    .logo-text h1 { font-size:1.1rem; }
    .msg { padding:14px 16px; }
    .view-tog { display:none; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg-glass-strong); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.15); }
::selection { background:rgba(99,102,241,.3); color:#fff; }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
</div>

<div id="app">
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="logo-text">
                    <h1>SMS Live</h1>
                    <span class="logo-sub">Real-time Dashboard</span>
                </div>
            </div>
        </div>
        <div class="header-center">
            <div class="status-pill" id="statusPill">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </div>
        <div class="header-right">
            <div class="chip" id="countChip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <span>0</span>
            </div>
            <div class="chip" id="timerChip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>4s</span>
            </div>
            <button class="icon-btn" id="refreshBtn" title="Refresh Now">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
            <button class="icon-btn" id="soundBtn" title="Toggle Sound">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
        </div>
    </header>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-box">
            <div class="stat-ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <div class="stat-info"><span class="stat-val" id="sTotal">0</span><span class="stat-lbl">Total Messages</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-ico green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div class="stat-info"><span class="stat-val" id="sLatest">--:--</span><span class="stat-lbl">Latest SMS</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-ico purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
            <div class="stat-info"><span class="stat-val" id="sSource">--</span><span class="stat-lbl">Source</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-ico orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></div>
            <div class="stat-info"><span class="stat-val" id="sRefresh">0</span><span class="stat-lbl">Refreshes</span></div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <div class="search-box">
            <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search messages, numbers...">
            <kbd>Ctrl+K</kbd>
        </div>
        <div class="pills">
            <button class="pill active" data-f="all">All</button>
            <button class="pill" data-f="whatsapp"><span class="dot wa"></span>WhatsApp</button>
            <button class="pill" data-f="other"><span class="dot ot"></span>Other</button>
        </div>
        <div class="view-tog">
            <button class="vbtn active" id="vList" title="List View">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
            <button class="vbtn" id="vGrid" title="Grid View">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress"><div class="progress-bar" id="pBar"></div></div>

    <!-- Messages -->
    <div class="msg-wrap">
        <div class="loading" id="loader">
            <div class="spinner"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
            <p>Fetching messages...</p>
        </div>
        <div class="msg-list" id="msgList"></div>
        <div class="empty hidden" id="emptyMsg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>No messages found</h3>
            <p>Messages will appear here automatically</p>
        </div>
    </div>

    <!-- Scroll top -->
    <button class="scroll-top hidden" id="scrollTop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <!-- Toasts -->
    <div class="toasts" id="toasts"></div>
</div>

<script>
(function(){
'use strict';

// ── Config ──
const API = 'http://147.135.212.197/crapi/st/viewstats?token=R1dURklBUzR3kpNfiIuJaIdmlHNeZWFEc5N0U0VsjGtKiXBIZ5h5hA==';
const INTERVAL = 4000;
const TICK = 50;
const TOAST_MS = 3500;

// ── State ──
let msgs = [], prevIds = new Set(), refreshCount = 0;
let filter = 'all', query = '', viewMode = 'list';
let firstLoad = true, fetching = false, sound = false;
let rTimer, pTimer, pVal = 0;

// ── DOM ──
const $ = s => document.querySelector(s);
const el = {
    pill: $('#statusPill'),
    pillTxt: null,
    countChip: $('#countChip span'),
    timerChip: $('#timerChip span'),
    refreshBtn: $('#refreshBtn'),
    soundBtn: $('#soundBtn'),
    sTotal: $('#sTotal'), sLatest: $('#sLatest'),
    sSource: $('#sSource'), sRefresh: $('#sRefresh'),
    search: $('#searchInput'),
    pills: document.querySelectorAll('.pill'),
    vList: $('#vList'), vGrid: $('#vGrid'),
    pBar: $('#pBar'),
    loader: $('#loader'),
    empty: $('#emptyMsg'),
    list: $('#msgList'),
    scrollTop: $('#scrollTop'),
    toasts: $('#toasts'),
};
el.pillTxt = el.pill.querySelector('.status-text');

// ── WA Icon SVG ──
const WA_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.627.616l4.584-1.207A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.239 0-4.313-.726-5.992-1.955l-.418-.31-2.724.717.749-2.636-.34-.443A9.955 9.955 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>';
const MSG_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

// ── Fetch ──
async function fetchData(retry=0) {
    if (fetching) return;
    fetching = true;
    try {
        const r = await fetch(API);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const t = await r.text();
        if (t.includes('too many') || t.includes('Error')) {
            if (retry < 3) { fetching = false; await sleep(2000); return fetchData(retry+1); }
            throw new Error('Rate limited');
        }
        const d = JSON.parse(t);
        process(d);
        setStatus('live','Live');
    } catch(e) {
        console.error(e);
        setStatus('error','Error');
        if (firstLoad) toast('error','Failed to connect');
    } finally {
        fetching = false;
        refreshCount++;
        updateStats();
    }
}

function process(d) {
    if (!d || !d.value || !Array.isArray(d.value)) return;
    const newMsgs = d.value.map((v,i) => ({
        id: v[1]+'_'+v[3], src: v[0]||'Unknown',
        phone: v[1]||'', body: v[2]||'', ts: v[3]||'', idx: i
    }));
    const curIds = new Set(newMsgs.map(m=>m.id));
    const fresh = [];
    if (!firstLoad) {
        for (const m of newMsgs) { if (!prevIds.has(m.id)) fresh.push(m.id); }
        if (fresh.length) {
            toast('success', fresh.length + ' new message' + (fresh.length>1?'s':'') + '!');
            if (sound) beep();
        }
    }
    prevIds = curIds;
    msgs = newMsgs;
    if (firstLoad) { el.loader.classList.add('hidden'); firstLoad = false; }
    render(fresh);
}

// ── Render ──
function render(fresh=[]) {
    const fm = filtered();
    if (!fm.length) { el.list.innerHTML=''; el.empty.classList.remove('hidden'); return; }
    el.empty.classList.add('hidden');
    el.list.innerHTML = fm.map((m,i) => card(m,i,fresh.includes(m.id))).join('');
    el.list.querySelectorAll('.cp-msg').forEach(b => b.addEventListener('click', onCopy));
    el.list.querySelectorAll('.cp-code').forEach(b => b.addEventListener('click', onCopyCode));
    el.list.querySelectorAll('.cp-phone').forEach(b => b.addEventListener('click', onCopyPhone));
}

function card(m,i,isNew) {
    const isWa = m.src.toLowerCase()==='whatsapp';
    const bc = isWa ? 'wa' : 'ot';
    const icon = isWa ? WA_SVG : MSG_SVG;
    const body = fmtBody(m.body);
    const ago = timeAgo(m.ts);
    const code = extractCode(m.body);
    return `<div class="msg ${isNew?'fresh':''}" style="animation-delay:${i*.05}s">
        <div class="msg-head">
            <div class="msg-src">
                <span class="badge ${bc}">${icon} ${m.src}</span>
                <span class="msg-phone">${fmtPhone(m.phone)}</span>
            </div>
            <div class="msg-time">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>${fmtTs(m.ts)}</span>
                ${ago?`<span class="time-ago">· ${ago}</span>`:''}
            </div>
        </div>
        <div class="msg-body">${body}</div>
        <div class="msg-foot">
            <span class="msg-idx">#${msgs.length - m.idx}</span>
            <div class="msg-actions">
                ${code?`<button class="abtn cp-code" data-v="${code}" title="Copy Code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>`:''}
                <button class="abtn cp-msg" data-v="${esc(m.body)}" title="Copy Text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                <button class="abtn cp-phone" data-v="${esc(m.phone)}" title="Copy Number"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
            </div>
        </div>
    </div>`;
}

// ── Helpers ──
function fmtPhone(p) {
    if (!p) return '';
    return p.length > 10 ? '+'+p.slice(0,3)+' '+p.slice(3,7)+' '+p.slice(7) : p;
}
function fmtTs(ts) {
    if (!ts) return '';
    try { return new Date(ts.replace(' ','T')+'Z').toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}); }
    catch { return ts; }
}
function fmtBody(b) {
    if (!b) return '';
    let s = escHtml(b);
    s = s.replace(/\\n/g,'<br>').replace(/\n/g,'<br>');
    s = s.replace(/(\d{3}-\d{3})/g,'<span class="code-hl">$1</span>');
    s = s.replace(/\b(\d{6})\b/g,'<span class="code-hl">$1</span>');
    return s;
}
function extractCode(b) {
    if (!b) return null;
    const m = b.match(/(\d{3}-\d{3})/); if (m) return m[1];
    const m2 = b.match(/\b(\d{6})\b/); if (m2) return m2[1];
    return null;
}
function timeAgo(ts) {
    if (!ts) return '';
    try {
        const d = new Date(ts.replace(' ','T')+'Z');
        const s = Math.floor((Date.now()-d)/1000);
        if (s<10) return 'just now'; if (s<60) return s+'s ago';
        if (s<3600) return Math.floor(s/60)+'m ago';
        if (s<86400) return Math.floor(s/3600)+'h ago';
        return Math.floor(s/86400)+'d ago';
    } catch { return ''; }
}
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function filtered() {
    let m = [...msgs];
    if (filter==='whatsapp') m = m.filter(x=>x.src.toLowerCase()==='whatsapp');
    else if (filter==='other') m = m.filter(x=>x.src.toLowerCase()!=='whatsapp');
    if (query) { const q=query.toLowerCase(); m=m.filter(x=>x.phone.toLowerCase().includes(q)||x.body.toLowerCase().includes(q)||x.src.toLowerCase().includes(q)); }
    return m;
}
function updateStats() {
    el.sTotal.textContent = msgs.length;
    el.countChip.textContent = msgs.length;
    el.sRefresh.textContent = refreshCount;
    if (msgs.length) {
        el.sLatest.textContent = fmtTs(msgs[0].ts);
        el.sSource.textContent = msgs[0].src;
    }
}
function setStatus(t,txt) { el.pill.className='status-pill '+t; el.pillTxt.textContent=txt; }

// ── Toast ──
const ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="toast-i"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="toast-i"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="toast-i"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
};
function toast(type, msg) {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = (ICONS[type]||ICONS.info) + '<span>'+msg+'</span>';
    el.toasts.appendChild(t);
    setTimeout(()=>{ t.classList.add('toast-out'); setTimeout(()=>t.remove(),300); }, TOAST_MS);
}

// ── Sound ──
function beep() {
    try {
        const c = new (window.AudioContext||window.webkitAudioContext)();
        const o = c.createOscillator(); const g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value=880; o.type='sine';
        g.gain.setValueAtTime(.1,c.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);
        o.start(c.currentTime); o.stop(c.currentTime+.3);
    } catch(e){}
}

// ── Copy ──
function clip(t) { if(navigator.clipboard) navigator.clipboard.writeText(t); else { const a=document.createElement('textarea'); a.value=t; a.style.position='fixed'; a.style.left='-9999px'; document.body.appendChild(a); a.select(); document.execCommand('copy'); document.body.removeChild(a); } }
function onCopy(e) { e.stopPropagation(); clip(e.currentTarget.dataset.v); toast('success','Copied!'); flash(e); }
function onCopyCode(e) { e.stopPropagation(); const c=e.currentTarget.dataset.v; clip(c); toast('success','Code '+c+' copied!'); flash(e); }
function onCopyPhone(e) { e.stopPropagation(); clip(e.currentTarget.dataset.v); toast('success','Number copied!'); flash(e); }
function flash(e) { const c=e.currentTarget.closest('.msg'); c.classList.add('copied'); setTimeout(()=>c.classList.remove('copied'),600); }

// ── Auto Refresh ──
function startRefresh() {
    stopRefresh(); pVal=0; el.pBar.style.width='0%';
    pTimer = setInterval(()=>{
        pVal += (TICK/INTERVAL)*100;
        if(pVal>100) pVal=100;
        el.pBar.style.width = pVal+'%';
        el.timerChip.textContent = Math.ceil((INTERVAL-(pVal/100*INTERVAL))/1000)+'s';
    }, TICK);
    rTimer = setInterval(()=>{ pVal=0; el.pBar.style.width='0%'; fetchData(); }, INTERVAL);
}
function stopRefresh() { clearInterval(rTimer); clearInterval(pTimer); }
function manualRefresh() {
    el.refreshBtn.classList.add('spinning');
    setTimeout(()=>el.refreshBtn.classList.remove('spinning'),800);
    stopRefresh(); pVal=0; el.pBar.style.width='0%';
    fetchData().then(()=>startRefresh());
}

// ── Events ──
function bind() {
    el.refreshBtn.addEventListener('click', manualRefresh);
    el.soundBtn.addEventListener('click', ()=>{
        sound=!sound;
        el.soundBtn.style.color = sound ? 'var(--green)' : '';
        toast('info', sound ? 'Sound ON' : 'Sound OFF');
        if (sound) beep();
    });
    el.search.addEventListener('input', e=>{ query=e.target.value.trim(); render(); });
    document.addEventListener('keydown', e=>{
        if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); el.search.focus(); }
        if (e.key==='Escape') { el.search.blur(); el.search.value=''; query=''; render(); }
    });
    el.pills.forEach(p=>{
        p.addEventListener('click',()=>{
            el.pills.forEach(x=>x.classList.remove('active'));
            p.classList.add('active');
            filter=p.dataset.f;
            render();
        });
    });
    el.vList.addEventListener('click',()=>{ viewMode='list'; el.vList.classList.add('active'); el.vGrid.classList.remove('active'); el.list.classList.remove('grid'); });
    el.vGrid.addEventListener('click',()=>{ viewMode='grid'; el.vGrid.classList.add('active'); el.vList.classList.remove('active'); el.list.classList.add('grid'); });
    window.addEventListener('scroll',()=>{ el.scrollTop.classList.toggle('hidden', window.scrollY<300); });
    el.scrollTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
}

// ── Init ──
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
async function init() {
    bind();
    setStatus('','Connecting...');
    await fetchData();
    startRefresh();
    toast('info','Dashboard live — auto-refresh 4s');
}
if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
