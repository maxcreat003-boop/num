<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time SMS Dashboard - Live message monitoring">
    <title>SMS Live Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
    --bg:#000;
    --bg-card:rgba(255,255,255,.04);
    --bg-hover:rgba(255,255,255,.07);
    --glass:rgba(255,255,255,.05);
    --glass2:rgba(255,255,255,.09);
    --text:#fff;
    --dim:#a0a0b8;
    --muted:#5a5a78;
    --accent:#6366f1;
    --accent-g:rgba(99,102,241,.25);
    --green:#10b981;
    --green-g:rgba(16,185,129,.25);
    --purple:#a855f7;
    --orange:#f59e0b;
    --pink:#ec4899;
    --red:#ef4444;
    --cyan:#06b6d4;
    --wa:#25D366;
    --wa-g:rgba(37,211,102,.18);
    --border:rgba(255,255,255,.07);
    --border-h:rgba(255,255,255,.14);
    --r:14px;--rs:8px;--rp:50px;
    --fast:.15s cubic-bezier(.4,0,.2,1);
    --base:.25s cubic-bezier(.4,0,.2,1);
}

html{scroll-behavior:smooth}
body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
}

/* ═══ BACKGROUND ORBS ═══ */
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.2;animation:od 20s ease-in-out infinite}
.o1{width:500px;height:500px;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);top:-10%;left:-5%;animation-duration:26s}
.o2{width:400px;height:400px;background:radial-gradient(circle,var(--purple) 0%,transparent 70%);top:40%;right:-8%;animation-delay:-6s;animation-duration:22s}
.o3{width:300px;height:300px;background:radial-gradient(circle,var(--pink) 0%,transparent 70%);bottom:-5%;left:20%;animation-delay:-12s;animation-duration:24s}
.o4{width:250px;height:250px;background:radial-gradient(circle,var(--cyan) 0%,transparent 70%);top:20%;left:40%;animation-delay:-16s;animation-duration:28s}
@keyframes od{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(60px,-80px) scale(1.1)}50%{transform:translate(-40px,60px) scale(.9)}75%{transform:translate(80px,40px) scale(1.05)}}

/* ═══ MAIN LAYOUT ═══ */
.layout{
    position:relative;z-index:2;
    display:flex;width:100%;min-height:100vh;
}

/* Left side — blank for now */
.left-panel{
    flex:1;
    min-height:100vh;
    /* reserved for future content */
}

/* Right panel — message dashboard */
.right-panel{
    width:42%;
    max-width:520px;
    min-width:380px;
    height:100vh;
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--border);
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    position:relative;
    overflow:hidden;
}

/* ═══ PANEL HEADER ═══ */
.panel-head{
    padding:14px 18px;
    border-bottom:1px solid var(--border);
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(20px);
    flex-shrink:0;
}
.panel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-box{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    display:flex;align-items:center;justify-content:center;
    color:#fff;box-shadow:0 4px 20px var(--accent-g);
}
.logo-box svg{width:18px;height:18px}
.logo-t h1{
    font-size:1.15rem;font-weight:800;line-height:1.2;
    background:linear-gradient(135deg,#fff 0%,#a5b4fc 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;letter-spacing:-.02em;
}
.logo-s{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600}

.head-btns{display:flex;align-items:center;gap:6px}
.st-pill{
    display:flex;align-items:center;gap:6px;
    padding:4px 12px;border-radius:var(--rp);
    background:var(--glass);border:1px solid var(--border);
    font-size:.7rem;font-weight:500;color:var(--dim);
}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:bk 2s ease-in-out infinite}
.st-pill.live .st-dot{background:var(--green);box-shadow:0 0 10px var(--green-g)}
.st-pill.live .st-txt{color:var(--green)}
.st-pill.error .st-dot{background:var(--red);animation:none}
.st-pill.error .st-txt{color:var(--red)}
@keyframes bk{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.ib{
    width:32px;height:32px;border-radius:8px;
    border:1px solid var(--border);background:var(--glass);
    color:var(--dim);display:flex;align-items:center;
    justify-content:center;cursor:pointer;transition:all var(--base);
}
.ib svg{width:14px;height:14px}
.ib:hover{background:var(--glass2);border-color:var(--border-h);color:#fff;transform:scale(1.05)}
.ib:active{transform:scale(.93)}
.ib.spin svg{animation:sp .8s ease-in-out}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Stats row */
.stats-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    margin-bottom:10px;
}
.st-card{
    padding:10px 8px;border-radius:10px;
    background:var(--glass);border:1px solid var(--border);
    text-align:center;transition:all var(--base);
}
.st-card:hover{background:var(--glass2);transform:translateY(-1px)}
.sv{font-size:.85rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;display:block}
.sl{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-top:2px}

/* Search & filter */
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sbox{flex:1;position:relative;display:flex;align-items:center}
.sbox svg.si{position:absolute;left:10px;width:14px;height:14px;color:var(--muted);pointer-events:none}
.sbox input{
    width:100%;padding:8px 10px 8px 32px;border-radius:8px;
    border:1px solid var(--border);background:var(--glass);
    color:#fff;font-family:'Inter',sans-serif;font-size:.8rem;
    outline:none;transition:all var(--base);
}
.sbox input::placeholder{color:var(--muted)}
.sbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);background:var(--glass2)}

.pills{display:flex;gap:4px;flex-shrink:0}
.pill{
    padding:6px 12px;border-radius:var(--rp);
    border:1px solid var(--border);background:var(--glass);
    color:var(--dim);font-size:.72rem;font-weight:500;
    cursor:pointer;transition:all var(--base);
    display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;
}
.pill:hover{background:var(--glass2);border-color:var(--border-h)}
.pill.active{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(99,102,241,.08));border-color:var(--accent);color:var(--accent)}
.dt{width:6px;height:6px;border-radius:50%}.dt.wa{background:var(--wa)}.dt.ot{background:var(--orange)}

/* Progress */
.prog{width:100%;height:2px;background:var(--glass);border-radius:1px;overflow:hidden;flex-shrink:0}
.prog-bar{
    height:100%;width:0%;border-radius:1px;
    background:linear-gradient(90deg,var(--accent),var(--purple),var(--cyan));
    transition:width .1s linear;background-size:200% 100%;
    animation:shm 2s linear infinite;
}
@keyframes shm{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══ MESSAGES SCROLL ═══ */
.msg-scroll{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:12px 14px;
    scroll-behavior:smooth;
}
.msg-scroll::-webkit-scrollbar{width:4px}
.msg-scroll::-webkit-scrollbar-track{background:transparent}
.msg-scroll::-webkit-scrollbar-thumb{background:var(--glass2);border-radius:2px}
.msg-scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}

.msg-list{display:flex;flex-direction:column;gap:8px}

/* Message card */
.msg{
    position:relative;padding:14px 16px;border-radius:var(--r);
    background:var(--glass);border:1px solid var(--border);
    backdrop-filter:blur(16px);transition:all var(--base);
    cursor:pointer;overflow:hidden;
    animation:cIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
.msg::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(180deg,var(--wa),var(--cyan));
    border-radius:0 2px 2px 0;opacity:0;transition:opacity var(--base);
}
.msg:hover{background:var(--bg-hover);border-color:var(--border-h);transform:translateX(3px)}
.msg:hover::before{opacity:1}
.msg.fresh{
    animation:fIn .6s cubic-bezier(.34,1.56,.64,1) both;
    border-color:var(--green);box-shadow:0 0 25px var(--green-g);
}
.msg.fresh::before{opacity:1;background:linear-gradient(180deg,var(--green),var(--cyan))}
@keyframes cIn{from{opacity:0;transform:translateY(15px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fIn{0%{opacity:0;transform:translateX(-20px) scale(.95);box-shadow:0 0 40px var(--green-g)}50%{box-shadow:0 0 60px var(--green-g)}100%{opacity:1;transform:translateX(0) scale(1);box-shadow:0 0 25px var(--green-g)}}

.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ms{display:flex;align-items:center;gap:6px}
.badge{
    display:flex;align-items:center;gap:5px;
    padding:3px 8px;border-radius:var(--rp);
    font-size:.63rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
}
.badge.wa{background:var(--wa-g);color:var(--wa);border:1px solid rgba(37,211,102,.2)}
.badge.ot{background:rgba(245,158,11,.1);color:var(--orange);border:1px solid rgba(245,158,11,.2)}
.badge svg{width:11px;height:11px}
.mp{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:600;color:#fff;letter-spacing:.02em}
.mt{display:flex;align-items:center;gap:3px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.mt svg{width:11px;height:11px}
.ta{color:var(--cyan);font-weight:500}

.mb{
    font-size:.82rem;color:var(--dim);line-height:1.55;
    word-break:break-word;padding-left:10px;
    border-left:2px solid var(--border);
}
.code-hl{
    display:inline-block;font-family:'JetBrains Mono',monospace;
    font-size:1rem;font-weight:700;color:var(--green);
    background:rgba(16,185,129,.1);padding:1px 7px;
    border-radius:4px;letter-spacing:.15em;margin:0 2px;
}

.mf{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;padding-top:8px;border-top:1px solid var(--border);
}
.mi{font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:var(--rs);background:var(--glass)}
.ma{display:flex;gap:5px;opacity:0;transition:opacity var(--base)}
.msg:hover .ma{opacity:1}
.ab{
    width:26px;height:26px;border-radius:var(--rs);
    border:1px solid var(--border);background:var(--glass);
    color:var(--muted);display:flex;align-items:center;
    justify-content:center;cursor:pointer;transition:all var(--fast);
}
.ab:hover{color:var(--accent);border-color:var(--accent);background:rgba(99,102,241,.1)}
.ab svg{width:12px;height:12px}

/* Loading / Empty */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:50px 0;color:var(--muted)}
.ld.h,.em.h{display:none}
.spn{position:relative;width:40px;height:40px}
.rng{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:rs 1.5s linear infinite}
.rng:nth-child(1){border-top-color:var(--accent)}
.rng:nth-child(2){inset:4px;border-right-color:var(--purple);animation-delay:.2s;animation-direction:reverse}
.rng:nth-child(3){inset:8px;border-bottom-color:var(--cyan);animation-delay:.4s}
@keyframes rs{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.em{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:50px 0;color:var(--muted)}
.em svg{opacity:.3}
.em h3{color:var(--dim);font-weight:600;font-size:.9rem}

/* ═══ TOASTS ═══ */
.toasts{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
    display:flex;align-items:center;gap:8px;
    padding:10px 16px;border-radius:10px;
    background:rgba(0,0,0,.8);backdrop-filter:blur(20px);
    border:1px solid var(--border);color:#fff;
    font-size:.8rem;font-weight:500;
    box-shadow:0 12px 40px rgba(0,0,0,.5);
    animation:tI .4s cubic-bezier(.34,1.56,.64,1);
    max-width:300px;
}
.toast.success{border-color:rgba(16,185,129,.3)}
.toast.info{border-color:rgba(99,102,241,.3)}
.toast.error{border-color:rgba(239,68,68,.3)}
.ti{width:18px;height:18px;flex-shrink:0}
.toast.success .ti{color:var(--green)}
.toast.info .ti{color:var(--accent)}
.toast.error .ti{color:var(--red)}
.tO{animation:tOu .3s ease forwards}
@keyframes tI{from{opacity:0;transform:translateX(80px) scale(.8)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes tOu{to{opacity:0;transform:translateX(80px) scale(.8)}}

.copied{animation:cf .5s ease}
@keyframes cf{0%{background:rgba(16,185,129,.2)}100%{background:var(--glass)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:600px){
    .layout{flex-direction:column}
    .left-panel{display:none}
    .right-panel{width:100%;max-width:none;min-width:unset;border-left:none}
}
@media(max-width:480px){
    .stats-row{grid-template-columns:repeat(2,1fr)}
    .pills{flex-wrap:wrap}
    .msg{padding:12px 14px}
}

::selection{background:rgba(99,102,241,.3);color:#fff}
</style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb o1"></div><div class="orb o2"></div>
    <div class="orb o3"></div><div class="orb o4"></div>
</div>

<div class="layout">
    <!-- LEFT PANEL — reserved / blank -->
    <div class="left-panel" id="leftPanel"></div>

    <!-- RIGHT PANEL — SMS Dashboard -->
    <div class="right-panel" id="rightPanel">
        <!-- Panel Header -->
        <div class="panel-head">
            <div class="panel-top">
                <div class="logo-row">
                    <div class="logo-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <div class="logo-t">
                        <h1>Secured by Core</h1>
                        <span class="logo-s">Real-time Feed</span>
                    </div>
                </div>
                <div class="head-btns">
                    <div class="st-pill" id="stPill">
                        <span class="st-dot"></span>
                        <span class="st-txt">Connecting...</span>
                    </div>
                    <button class="ib" id="refBtn" title="Refresh">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    </button>
                    <button class="ib" id="sndBtn" title="Sound">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                </div>
            </div>

            <!-- Mini Stats -->
            <div class="stats-row">
                <div class="st-card"><span class="sv" id="sT">0</span><span class="sl">Messages</span></div>
                <div class="st-card"><span class="sv" id="sL">--:--</span><span class="sl">Latest</span></div>
                <div class="st-card"><span class="sv" id="sS">--</span><span class="sl">Source</span></div>
                <div class="st-card"><span class="sv" id="sR">0</span><span class="sl">Refreshes</span></div>
            </div>

            <!-- Search + Filters -->
            <div class="search-row">
                <div class="sbox">
                    <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="sIn" placeholder="Search messages...">
                </div>
                <div class="pills">
                    <button class="pill active" data-f="all">All</button>
                    <button class="pill" data-f="whatsapp"><span class="dt wa"></span>WA</button>
                    <button class="pill" data-f="other"><span class="dt ot"></span>Other</button>
                </div>
            </div>

            <!-- Refresh progress -->
            <div class="prog"><div class="prog-bar" id="pBar"></div></div>
        </div>

        <!-- Scrollable Messages -->
        <div class="msg-scroll" id="msgScroll">
            <div class="ld" id="loader">
                <div class="spn"><div class="rng"></div><div class="rng"></div><div class="rng"></div></div>
                <p>Fetching messages...</p>
            </div>
            <div class="msg-list" id="mList"></div>
            <div class="em h" id="emMsg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <h3>No messages found</h3>
                <p style="font-size:.8rem">Messages appear here automatically</p>
            </div>
        </div>
    </div>
</div>

<!-- Toasts -->
<div class="toasts" id="toasts"></div>

<script>
(function(){
'use strict';

const RAW='http://147.135.212.197/crapi/st/viewstats?token=R1dURklBUzR3kpNfiIuJaIdmlHNeZWFEc5N0U0VsjGtKiXBIZ5h5hA==';

const WA_I='<svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.627.616l4.584-1.207A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.239 0-4.313-.726-5.992-1.955l-.418-.31-2.724.717.749-2.636-.34-.443A9.955 9.955 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>';
const MS_I='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

async function fetchD(rt=0){
    if(fetching)return;fetching=true;
    try{
        let url, pType;
        if(isLocal){
            url='/api/messages'; pType='raw';
        } else {
            url=PROXIES[pxI].url; pType=PROXIES[pxI].type;
        }
        
        const r=await fetch(url);
        if(!r.ok) throw new Error('HTTP '+r.status);
        let t=await r.text();
        
        // allorigins wraps response in {contents:"..."}
        if(pType==='allorigins'){
            try{
                const wrap=JSON.parse(t);
                t=wrap.contents||t;
            }catch(e){ /* use raw */ }
        }
        
        // Check rate limit
        if(t.includes('too many')||t.includes('Error,')){
            if(rt<3){fetching=false;await slp(6000);return fetchD(rt+1);}
            throw new Error('Rate limited');
        }
        
        proc(JSON.parse(t));
        setSt('live','Live');
    }catch(e){
        console.error('Proxy '+pxI+' failed:',e.message);
        if(!isLocal){
            pxI=(pxI+1)%PROXIES.length;
            console.log('Switching to proxy '+pxI+': '+PROXIES[pxI].type);
        }
        setSt('error','Retrying...');
        if(first&&rt>=2)toast('error','Connecting...');
    }
    finally{fetching=false;rCnt++;upStats();}
}

function proc(d){
    // Handle both formats: plain array [[...]] or {value:[[...]]}
    let arr;
    if(Array.isArray(d)) arr=d;
    else if(d&&d.value&&Array.isArray(d.value)) arr=d.value;
    else return;
    if(!arr.length) return;
    const nm=arr.map((v,i)=>({id:v[1]+'_'+v[3],src:v[0]||'?',phone:v[1]||'',body:v[2]||'',ts:v[3]||'',idx:i}));
    const ci=new Set(nm.map(m=>m.id));
    const fr=[];
    if(!first){for(const m of nm)if(!prev.has(m.id))fr.push(m.id);if(fr.length){toast('success',fr.length+' new message'+(fr.length>1?'s':'')+'!');if(snd)beep();}}
    prev=ci;msgs=nm;
    if(first){el.loader.classList.add('h');first=false;}
    render(fr);
    // Auto scroll to top when new messages arrive
    if(fr.length>0){el.scroll.scrollTo({top:0,behavior:'smooth'});}
}

function render(fr=[]){
    const fm=filt();
    if(!fm.length){el.list.innerHTML='';el.empty.classList.remove('h');return;}
    el.empty.classList.add('h');
    el.list.innerHTML=fm.map((m,i)=>card(m,i,fr.includes(m.id))).join('');
    el.list.querySelectorAll('.c1').forEach(b=>b.addEventListener('click',onCp));
    el.list.querySelectorAll('.c2').forEach(b=>b.addEventListener('click',onCpC));
    el.list.querySelectorAll('.c3').forEach(b=>b.addEventListener('click',onCpP));
}

function card(m,i,n){
    const w=m.src.toLowerCase()==='whatsapp';
    const bc=w?'wa':'ot',ic=w?WA_I:MS_I;
    const body=fB(m.body),ago=tAgo(m.ts),code=exC(m.body);
    return`<div class="msg ${n?'fresh':''}" style="animation-delay:${i*.04}s">
<div class="mh"><div class="ms"><span class="badge ${bc}">${ic} ${m.src}</span><span class="mp">${fP(m.phone)}</span></div>
<div class="mt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>${fTs(m.ts)}</span>${ago?`<span class="ta">· ${ago}</span>`:''}</div></div>
<div class="mb">${body}</div>
<div class="mf"><span class="mi">#${msgs.length-m.idx}</span><div class="ma">
${code?`<button class="ab c2" data-v="${code}" title="Copy Code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>`:''}
<button class="ab c1" data-v="${esc(m.body)}" title="Copy Text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
<button class="ab c3" data-v="${esc(m.phone)}" title="Copy Number"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
</div></div></div>`;
}

function fP(p){return !p?'':p.length>10?'+'+p.slice(0,3)+' '+p.slice(3,7)+' '+p.slice(7):p}
function fTs(t){if(!t)return '';try{return new Date(t.replace(' ','T')+'Z').toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})}catch{return t}}
function fB(b){if(!b)return '';let s=escH(b);s=s.replace(/\\n/g,'<br>').replace(/\n/g,'<br>');s=s.replace(/(\d{3}-\d{3})/g,'<span class="code-hl">$1</span>');s=s.replace(/\b(\d{6})\b/g,'<span class="code-hl">$1</span>');return s}
function exC(b){if(!b)return null;const m=b.match(/(\d{3}-\d{3})/);if(m)return m[1];const m2=b.match(/\b(\d{6})\b/);if(m2)return m2[1];return null}
function tAgo(t){if(!t)return '';try{const d=new Date(t.replace(' ','T')+'Z');const s=Math.floor((Date.now()-d)/1000);if(s<10)return'just now';if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}catch{return ''}}
function escH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function filt(){let m=[...msgs];if(filter==='whatsapp')m=m.filter(x=>x.src.toLowerCase()==='whatsapp');else if(filter==='other')m=m.filter(x=>x.src.toLowerCase()!=='whatsapp');if(query){const q=query.toLowerCase();m=m.filter(x=>x.phone.toLowerCase().includes(q)||x.body.toLowerCase().includes(q)||x.src.toLowerCase().includes(q))}return m}
function upStats(){el.sT.textContent=msgs.length;el.sR.textContent=rCnt;if(msgs.length){el.sL.textContent=fTs(msgs[0].ts);el.sS.textContent=msgs[0].src}}
function setSt(t,x){el.pill.className='st-pill '+t;el.pillTxt.textContent=x}

const ICO={
    success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ti"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ti"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    error:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ti"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
};
function toast(type,msg){const t=document.createElement('div');t.className='toast '+type;t.innerHTML=(ICO[type]||ICO.info)+'<span>'+msg+'</span>';el.toasts.appendChild(t);setTimeout(()=>{t.classList.add('tO');setTimeout(()=>t.remove(),300)},T_MS)}
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start(c.currentTime);o.stop(c.currentTime+.3)}catch(e){}}
function clip(t){if(navigator.clipboard)navigator.clipboard.writeText(t);else{const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.left='-9999px';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}}
function onCp(e){e.stopPropagation();clip(e.currentTarget.dataset.v);toast('success','Copied!');fl(e)}
function onCpC(e){e.stopPropagation();const c=e.currentTarget.dataset.v;clip(c);toast('success','Code '+c+' copied!');fl(e)}
function onCpP(e){e.stopPropagation();clip(e.currentTarget.dataset.v);toast('success','Number copied!');fl(e)}
function fl(e){const c=e.currentTarget.closest('.msg');c.classList.add('copied');setTimeout(()=>c.classList.remove('copied'),600)}

function startR(){stopR();pV=0;el.pBar.style.width='0%';pT=setInterval(()=>{pV+=(TICK/INT)*100;if(pV>100)pV=100;el.pBar.style.width=pV+'%'},TICK);rT=setInterval(()=>{pV=0;el.pBar.style.width='0%';fetchD()},INT)}
function stopR(){clearInterval(rT);clearInterval(pT)}
function manR(){el.refBtn.classList.add('spin');setTimeout(()=>el.refBtn.classList.remove('spin'),800);stopR();pV=0;el.pBar.style.width='0%';fetchD().then(()=>startR())}

function bind(){
    el.refBtn.addEventListener('click',manR);
    el.sndBtn.addEventListener('click',()=>{snd=!snd;el.sndBtn.style.color=snd?'var(--green)':'';toast('info',snd?'Sound ON':'Sound OFF');if(snd)beep()});
    el.sIn.addEventListener('input',e=>{query=e.target.value.trim();render()});
    document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();el.sIn.focus()}if(e.key==='Escape'){el.sIn.blur();el.sIn.value='';query='';render()}});
    el.pills.forEach(p=>{p.addEventListener('click',()=>{el.pills.forEach(x=>x.classList.remove('active'));p.classList.add('active');filter=p.dataset.f;render()})});
}

function slp(ms){return new Promise(r=>setTimeout(r,ms))}
async function init(){bind();setSt('','Connecting...');await fetchD();startR();toast('info','Live — auto-refresh 4s')}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
